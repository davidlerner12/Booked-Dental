    <!-- Deferred analytics to reduce initial render/main-thread pressure -->
    <script>
      (function () {
        const GA4_ID = "G-DPRVM205R8";
        const GADS_ID = "AW-17992910932";
        const FB_PIXEL_ID = "932696116124868";

        window.dataLayer = window.dataLayer || [];
        window.gtag = window.gtag || function () {
          window.dataLayer.push(arguments);
        };

        if (!window.fbq) {
          var n = function () {
            n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
          };
          window._fbq = n;
          n.push = n;
          n.loaded = true;
          n.version = "2.0";
          n.queue = [];
          window.fbq = n;
        }

        const loadScript = (src, attrs) =>
          new Promise((resolve, reject) => {
            const script = document.createElement("script");
            script.src = src;
            Object.entries(attrs || {}).forEach(([key, value]) => {
              if (value === true) {
                script.setAttribute(key, "");
                return;
              }
              if (value !== false && value != null) {
                script.setAttribute(key, String(value));
              }
            });
            script.onload = resolve;
            script.onerror = reject;
            document.head.appendChild(script);
          });

        let trackingLoaded = false;
        const initTracking = () => {
          if (trackingLoaded) return;
          trackingLoaded = true;

          loadScript(`https://www.googletagmanager.com/gtag/js?id=${GADS_ID}`, { async: true }).finally(() => {
            window.gtag("js", new Date());
            window.gtag("config", GA4_ID);
            window.gtag("config", GADS_ID);
          });

          loadScript("https://connect.facebook.net/en_US/fbevents.js", { async: true }).finally(() => {
            window.fbq("init", FB_PIXEL_ID);
            window.fbq("track", "PageView");
          });
        };

        const onInteraction = () => {
          initTracking();
          ["pointerdown", "scroll", "keydown", "touchstart"].forEach((eventName) => {
            window.removeEventListener(eventName, onInteraction);
          });
        };

        ["pointerdown", "scroll", "keydown", "touchstart"].forEach((eventName) => {
          window.addEventListener(eventName, onInteraction, { passive: true, once: true });
        });

        window.addEventListener("load", () => {
          window.setTimeout(initTracking, 4000);
        }, { once: true });
      })();
    </script>
